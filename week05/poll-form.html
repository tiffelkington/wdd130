<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WDD 130 / HTML FORM = User Poll</title>
  <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
  <header>
    <h1> WDD 130 | HTML Form - User Poll</h1>
  </header>
  <main>
    <form>
      <fieldset>
        <legend>Contact Information</legend>
        <div class="form-item column2">
          <label>Full Name: <input type="text" name="fullname" required></label>
          <label>Email: <input type="email" name="useremail" required></label>
        </div>
      </fieldset>

      <fieldset>
        <Legend>Questions</Legend>
        <div class="form-item column1">
          <label for="browser">What is your favorite browser? </label>
          <select id="browser" name="browser">
            <option value="chrome">Chrome</option>
            <option value="safari">Safari</option>
            <option value="edge">Edge</option>
            <option value="brave">Brave</option>
            <option value="other">Other</option>
          </select>

          <label for="pet" class="petspace">Do you have a household pet?</label>
          <input type="checkbox" id="pet" name="pet">
          <label for="feedback"> List the places you have lived:</label>
        </div>
        <div class="placespace">

          <textarea id="feedback" class="feedbackspace" name="feedback" rows="4"
            placeholder="Samplecity1, Townville2, Village3"></textarea>
        </div>
      </fieldset>
      <button type="submit" class="buttonspace">Submit Poll</button>
    </form>
  </main>
  <footer>
    <p>&copy; 2026 | User Poll Activity | Tiffany Elkington &#10070;</p>
  </footer>
</body>

</html>
